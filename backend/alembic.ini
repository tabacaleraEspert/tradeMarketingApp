# Alembic config para Trade Marketing App
#
# La URL de la DB NO se pone acá — la lee env.py desde app.config.settings,
# que a su vez respeta las variables de entorno USE_SQLITE / DATABASE_URL / DATABASE_USER etc.
#
# Comandos típicos (desde `backend/` con el venv activo):
#
#   # Aplicar todas las migraciones pendientes
#   alembic upgrade head
#
#   # Crear una nueva migración autogenerada (detecta cambios en los modelos)
#   alembic revision --autogenerate -m "add campo X a tabla Y"
#
#   # Marcar la DB actual como "up-to-date" sin correr migraciones (para bases existentes)
#   alembic stamp head
#
#   # Bajar una migración
#   alembic downgrade -1
#
#   # Ver el historial
#   alembic history

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
