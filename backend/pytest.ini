[pytest]
; Limitar la colección a tests/. Crítico: test_prod_integration.py (raíz de
; backend/) es un script standalone que corre CONTRA PRODUCCIÓN a nivel módulo;
; un `pytest` sin path lo colectaba, lo ejecutaba y dejaba datos TEST_* en prod
; (incidente 2026-07-08). Correrlo siempre explícito: .venv/bin/python test_prod_integration.py
testpaths = tests
