<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TM Espert" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Espert Trade Marketing</title>

    <!-- Splash screen styles -->
    <style>
      #splash{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0A0A09;transition:opacity .5s}
      #splash.hide{opacity:0;pointer-events:none}
      #splash .logo{width:90px;height:90px;animation:fadeUp .8s ease-out both}
      #splash .brand{color:#C9A962;font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:28px;letter-spacing:6px;margin-top:20px;animation:fadeUp .8s .2s ease-out both}
      #splash .sub{color:#979B9B;font-family:system-ui;font-size:10px;letter-spacing:4px;margin-top:8px;animation:fadeUp .8s .4s ease-out both}
      #splash .line{width:60px;height:1px;background:linear-gradient(90deg,transparent,#A48242,transparent);margin-top:12px;animation:fadeUp .8s .3s ease-out both}
      @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    </style>
  </head>

  <body>
    <!-- Splash screen -->
    <div id="splash">
      <svg class="logo" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gs" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#D4B876"/>
            <stop offset="100%" stop-color="#8B6E38"/>
          </linearGradient>
        </defs>
        <rect x="2" y="2" width="86" height="86" rx="20" fill="none" stroke="url(#gs)" stroke-width="1.5" opacity="0.5"/>
        <path d="M45 12 L49 19 L45 26 L41 19 Z" fill="url(#gs)" opacity="0.6"/>
        <text x="45" y="58" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="36" fill="url(#gs)" letter-spacing="2">TM</text>
        <rect x="20" y="64" width="50" height="1" rx="0.5" fill="url(#gs)" opacity="0.3"/>
        <text x="45" y="80" text-anchor="middle" font-family="system-ui" font-weight="700" font-size="9" fill="#C9A962" letter-spacing="4">ESPERT</text>
      </svg>
      <div class="brand">ESPERT</div>
      <div class="line"></div>
      <div class="sub">TRADE MARKETING</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash when app loads
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 500); }
        }, 800);
      });
      // Register service worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      }
    </script>
  </body>
</html>
